<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A73E8" />
    <meta name="description" content="NexMeet — Video calls and meetings for everyone. Free, secure, high-quality video conferencing." />
    <title>NexMeet — Video calls and meetings for everyone</title>
    <!-- Import Fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Import Material Icons Round -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Polyfills for simple-peer (Node.js compatibility) in Vite -->
    <script>
      window.global = window;
      window.process = window.process || {
        env: {},
        nextTick: function(fn) { return setTimeout(fn, 0); },
        browser: true,
        version: '',
        versions: {},
        hrtime: function() { return [0, 0]; },
        stdout: { write: function() {} },
        stderr: { write: function() {} },
        argv: [],
        binding: function() {},
        cwd: function() { return '/'; },
        exit: function() {}
      };
      // Ensure nextTick is always present even if process was already set
      if (!window.process.nextTick) {
        window.process.nextTick = function(fn) { return setTimeout(fn, 0); };
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
